<body>
    <header>
        <h1>Medivive - Products</h1>
    </header>

    <div class="products-container">
        <!-- Product 1 -->
        <div class="product">
            <img src="assets/paracetamol.jpg" alt="Paracetamol">
            <h3>Paracetamol</h3>
            <p class="desc">Relieves pain and fever.</p>
            <p class="price">$5</p>
            <div class="quantity-control">
                <button class="quantity-btn" onclick="updateQuantity('Paracetamol', 5, 'decrease')">-</button>
                <span id="quantity-Paracetamol">0</span>
                <button class="quantity-btn" onclick="updateQuantity('Paracetamol', 5, 'increase')">+</button>
            </div>
            <button class="add-to-cart" onclick="updateQuantity('Paracetamol', 5, 'increase')">Add to Cart</button>
        </div>

        <!-- Product 2 -->
        <div class="product">
            <img src="assets/ibuprofen.jpg" alt="Ibuprofen">
            <h3>Ibuprofen</h3>
            <p class="desc">Reduces inflammation and pain. (30 tablets)</p>
            <p class="price">$11</p>
            <div class="quantity-control">
                <button class="quantity-btn" onclick="updateQuantity('Ibuprofen', 11, 'decrease')">-</button>
                <span id="quantity-Ibuprofen">0</span>
                <button class="quantity-btn" onclick="updateQuantity('Ibuprofen', 11, 'increase')">+</button>
            </div>
            <button class="add-to-cart" onclick="updateQuantity('Ibuprofen', 11, 'increase')">Add to Cart</button>
        </div>
    </div>

    <!-- Cart Section -->
    <div class="cart-container">
        <h2>Your Cart</h2>
        <ul id="cart-items"></ul>
        <p id="total-price">Total: $0</p>
        <button class="cart-button" onclick="checkout()">Checkout</button>
    </div>

    <script src="script.js"></script>
</body>
