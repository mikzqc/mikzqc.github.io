<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percentage Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    .calculator {
      max-width: 400px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    .result {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>Percentage Calculator</h2>

    <!-- Exact order as requested -->
    <label>English (out of 80)</label>
    <input type="number" id="english" min="0" max="80" />

    <label>French (out of 80)</label>
    <input type="number" id="french" min="0" max="80" />

    <label>Maths (out of 80)</label>
    <input type="number" id="maths" min="0" max="80" />

    <label>Science (out of 80)</label>
    <input type="number" id="science" min="0" max="80" />

    <label>Social Science (out of 80)</label>
    <input type="number" id="social" min="0" max="80" />

    <label>Information Technology (out of 80)</label>
    <input type="number" id="it" min="0" max="80" />

    <button onclick="calculatePercentage()">Calculate Percentage</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function calculatePercentage() {
      const english = Number(document.getElementById('english').value) || 0;
      const french = Number(document.getElementById('french').value) || 0;
      const maths = Number(document.getElementById('maths').value) || 0;
      const science = Number(document.getElementById('science').value) || 0;
      const social = Number(document.getElementById('social').value) || 0;
      const it = Number(document.getElementById('it').value) || 0;

      const totalMarks = english + french + maths + science + social + it;
      const maxMarks = 80 * 6;

      const percentage = (totalMarks / maxMarks) * 100;

      document.getElementById('result').innerText =
        `Total: ${totalMarks} / ${maxMarks} | Percentage: ${percentage.toFixed(2)}%`;
    }
  </script>
</body>
</html>
