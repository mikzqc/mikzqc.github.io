<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Class 10 Maths – 50 MCQs at Once</title>
    <style>
        body {font-family:Arial,Helvetica,sans-serif; max-width:900px; margin:0 auto; padding:20px; line-height:1.5;}
        h1 {text-align:center;}
        label {display:block; margin-top:15px; font-weight:bold;}
        input[type=text], input[type=range] {width:100%; padding:8px; margin-top:5px;}
        button {margin-top:20px; padding:12px 24px; font-size:1rem;}
        #questions {margin-top:30px;}
        .mcq {background:#f9f9f9; border:1px solid #ddd; border-radius:6px; padding:12px; margin-bottom:12px;}
        .correct {color:#0a0; font-weight:bold;}
        .loading {color:#555; font-style:italic;}
        .error {color:#c00;}
    </style>
</head>
<body>
    <h1>CBSE Class 10 Maths – 50 MCQs in One Click</h1>

    <p>
        <strong>1.</strong> Get a free key from <a href="https://openrouter.ai/keys" target="_blank">OpenRouter</a> → paste it below.<br>
        <strong>2.</strong> Pick a chapter → click <em>Generate 50 MCQs</em>.
    </p>

    <label for="api-key">OpenRouter API Key:</label>
    <input type="password" id="api-key" placeholder="sk-or-...">

    <label for="chapter-slider">
        Chapter: <span id="chapter-name">Chapter 1: Real Numbers</span>
    </label>
    <input type="range" id="chapter-slider" min="1" max="14" value="1">

    <button id="generate-btn">Generate 50 MCQs</button>

    <div id="questions"></div>

    <script>
        /* ---------- CONFIG ---------- */
        const API_URL = 'https://openrouter.ai/api/v1/chat/completions';
        const MODEL   = 'deepseek/deepseek-r1:free';   // current free DeepSeek model

        const CHAPTERS = [
            "1: Real Numbers","2: Polynomials","3: Pair of Linear Equations in Two Variables",
            "4: Quadratic Equations","5: Arithmetic Progressions","6: Triangles",
            "7: Coordinate Geometry","8: Introduction to Trigonometry",
            "9: Some Applications of Trigonometry","10: Circles",
            "11: Areas Related to Circles","12: Surface Areas and Volumes",
            "13: Statistics","14: Probability"
        ];

        const MCQS_PER_CALL = 10;      // 5 parallel calls → 50 MCQs
        const TOTAL_CALLS   = 5;

        /* ---------- UI ---------- */
        const slider      = document.getElementById('chapter-slider');
        const chapterName = document.getElementById('chapter-name');
        const apiKeyInp   = document.getElementById('api-key');
        const btn         = document.getElementById('generate-btn');
        const outDiv      = document.getElementById('questions');

        slider.addEventListener('input', () => {
            chapterName.textContent = `Chapter ${CHAPTERS[slider.value-1]}`;
        });

        /* ---------- Prompt ---------- */
        function buildPrompt(chapter, count) {
            return `You are an expert CBSE Class 10 Mathematics teacher.
Generate **${count} brand-new** multiple-choice questions for **${chapter}**.
Rules:
- Exactly 4 options (A, B, C, D).
- One correct answer.
- After each question write: **Correct: X (where X = A/B/C/D)**
- Separate questions with a blank line.
- Keep language simple, NCERT-style.

Example:
Question: What is the HCF of 12 and 18?
Options:
A) 3   B) 6   C) 9   D) 12
Correct: B`;
        }

        /* ---------- One API call ---------- */
        async function callDeepSeek(chapter, count, apiKey) {
            const resp = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`,
                    'HTTP-Referer': location.href,
                    'X-Title': 'CBSE MCQ Generator'
                },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: instala:'system', content: 'You are a helpful CBSE Maths teacher.' },
                        { role: 'user',   content: buildPrompt(`Chapter ${chapter}`, count) }
                    ],
                    temperature: 0.9,
                    max_tokens: 2000,
                    stream: false
                })
            });

            if (!resp.ok) {
                const txt = await resp.text();
                throw new Error(`HTTP ${resp.status} – ${txt}`);
            }
            const data = await resp.json();
            return data.choices[0].message.content.trim();
        }

        /* ---------- Render MCQs ---------- */
        function renderMCQs(raw) {
            const blocks = raw.split('\n\n').filter(b => b.trim());
            blocks.forEach(block => {
                const lines = block.trim().split('\n');
                const mcqDiv = document.createElement('div');
                mcqDiv.className = 'mcq';

                let html = '', inOptions = false, correct = '';

                lines.forEach(line => {
                    line = line.trim();
                    if (!line) return;

                    if (line.toLowerCase().startsWith('question:')) {
                        html += `<strong>${line}</strong><br>`;
                        inOptions = false;
                    }
                    else if (line.toLowerCase().startsWith('options:')) {
                        html += `<strong>Options:</strong><br>`;
                        inOptions = true;
                    }
                    else if (line.toLowerCase().startsWith('correct:')) {
                        correct = line.split(/:\s*/)[1];
                    }
                    else if (inOptions) {
                        html += `<div style="margin-left:20px;">${line}</div>`;
                    }
                    else {
                        html += `${line}<br>`;
                    }
                });

                if (correct) html += `<p class="correct">Correct answer: ${correct}</p>`;
                mcqDiv.innerHTML = html;
                outDiv.appendChild(mcqDiv);
            });
        }

        /* ---------- Main generator ---------- */
        async function generate50() {
            const apiKey = apiKeyInp.value.trim();
            if (!apiKey) return alert('Paste your OpenRouter API key first.');

            const chapter = CHAPTERS[slider.value-1];
            outDiv.innerHTML = '<p class="loading">Generating 50 MCQs (5 parallel calls) …</p>';
            btn.disabled = true;

            try {
                const promises = [];
                for (let i = 0; i < TOTAL_CALLS; i++) {
                    promises.push(callDeepSeek(chapter, MCQS_PER_CALL, apiKey));
                }
                const results = await Promise.all(promises);

                outDiv.innerHTML = '';
                results.forEach(txt => renderMCQs(txt));
            } catch (e) {
                outDiv.innerHTML = `<p class="error">Error: ${e.message}</p>`;
                console.error(e);
            } finally {
                btn.disabled = false;
            }
        }

        btn.addEventListener('click', generate50);
    </script>
</body>
</html>
