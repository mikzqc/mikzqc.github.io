<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Percentage & Grade Calculator (CBSE)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      padding: 20px;
    }
    .calculator {
      max-width: 420px;
      margin: auto;
      background: #ffffff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }
    button {
      width: 100%;
      margin-top: 15px;
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    .result {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }
    .grade {
      margin-top: 5px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>CBSE Percentage & Grade Calculator</h2>

    <!-- Exact order as requested -->
    <label>English (out of 100)</label>
    <input type="number" id="english" min="0" max="100" />

    <label>French (out of 100)</label>
    <input type="number" id="french" min="0" max="100" />

    <label>Maths (out of 100)</label>
    <input type="number" id="maths" min="0" max="100" />

    <label>Science (out of 100)</label>
    <input type="number" id="science" min="0" max="100" />

    <label>Social Science (out of 100)</label>
    <input type="number" id="social" min="0" max="100" />

    <label>Information Technology (out of 100)</label>
    <input type="number" id="it" min="0" max="100" />

    <button onclick="calculatePercentage()">Calculate</button>

    <div class="result" id="result"></div>
    <div class="grade" id="grade"></div>
  </div>

  <script>
    function getGrade(percent) {
      if (percent >= 91) return "A1";
      if (percent >= 81) return "A2";
      if (percent >= 71) return "B1";
      if (percent >= 61) return "B2";
      if (percent >= 51) return "C1";
      if (percent >= 41) return "C2";
      if (percent >= 33) return "D";
      return "E (Fail)";
    }

    function calculatePercentage() {
      const english = Number(document.getElementById('english').value) || 0;
      const french = Number(document.getElementById('french').value) || 0;
      const maths = Number(document.getElementById('maths').value) || 0;
      const science = Number(document.getElementById('science').value) || 0;
      const social = Number(document.getElementById('social').value) || 0;
      const it = Number(document.getElementById('it').value) || 0;

      const totalMarks = english + french + maths + science + social + it;
      const maxMarks = 100 * 6;
      const percentage = (totalMarks / maxMarks) * 100;

      const grade = getGrade(percentage);

      document.getElementById('result').innerText =
        `Total: ${totalMarks} / ${maxMarks} | Percentage: ${percentage.toFixed(2)}%`;

      document.getElementById('grade').innerText = `Overall Grade: ${grade}`;
    }
  </script>
</body>
</html>
