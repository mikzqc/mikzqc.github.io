<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CBSE Percentage & Grade Calculator</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
    }
    .container {
        width: 400px;
        margin: 60px auto;
        background: white;
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
        text-align: center;
    }
    label {
        display: block;
        margin-top: 10px;
    }
    input {
        width: 100%;
        padding: 6px;
        margin-top: 4px;
    }
    .options {
        margin-top: 15px;
    }
    button {
        width: 100%;
        padding: 10px;
        margin-top: 15px;
        font-size: 16px;
    }
    .result {
        margin-top: 15px;
        text-align: center;
        font-weight: bold;
    }
</style>
</head>

<body>
<div class="container">
    <h2>CBSE Percentage & Grade Calculator</h2>

    <label>English (out of 100)</label>
    <input type="number" id="english">

    <label>French (out of 100)</label>
    <input type="number" id="french">

    <label>Maths (out of 100)</label>
    <input type="number" id="maths">

    <label>Science (out of 100)</label>
    <input type="number" id="science">

    <label>Social Science (out of 100)</label>
    <input type="number" id="sst">

    <label>Information Technology (out of 100)</label>
    <input type="number" id="it">

    <div class="options">
        <label>
            <input type="radio" name="mode" value="600" checked>
            Calculate out of 600 (no replacement)
        </label>
        <label>
            <input type="radio" name="mode" value="500">
            Calculate out of 500 (replace IT / best 4 after English)
        </label>
    </div>

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>
</div>

<script>
function calculate() {
    let english = Number(document.getElementById("english").value);
    let french = Number(document.getElementById("french").value);
    let maths = Number(document.getElementById("maths").value);
    let science = Number(document.getElementById("science").value);
    let sst = Number(document.getElementById("sst").value);
    let it = Number(document.getElementById("it").value);

    let mode = document.querySelector('input[name="mode"]:checked').value;

    let percentage;

    if (mode === "600") {
        let total = english + french + maths + science + sst + it;
        percentage = (total / 600) * 100;
    } else {
        let others = [french, maths, science, sst, it];
        others.sort((a, b) => b - a);
        let bestFour = others.slice(0, 4).reduce((a, b) => a + b, 0);
        let total = english + bestFour;
        percentage = (total / 500) * 100;
    }

    document.getElementById("result").innerText =
        "Percentage: " + percentage.toFixed(2) + "%";
}
</script>
</body>
</html>
