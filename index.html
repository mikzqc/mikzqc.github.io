<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CBSE Class-10 MCQ Generator (DeepSeek V3)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {font-family: Arial, sans-serif; margin: 2rem; background:#f9f9f9;}
    h1 {text-align:center;}
    .container {max-width:900px; margin:auto; background:#fff; padding:1.5rem; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1);}
    .slider-box {margin:1.5rem 0;}
    #lessonLabel {font-weight:bold; font-size:1.2rem;}
    #mcqOutput {margin-top:2rem; line-height:1.6;}
    button {padding:.6rem 1.2rem; font-size:1rem; cursor:pointer;}
    .loading {color:#555; font-style:italic;}
    .mcq {margin-bottom:1.2rem; border-bottom:1px solid #eee; padding-bottom:1rem;}
    .options {margin-left:1.5rem;}
    details {margin-top:.5rem;}
  </style>
</head>
<body>

<div class="container">
  <h1>CBSE Class-10 MCQ Generator</h1>

  <div class="slider-box">
    <label for="lessonSlider">Select Lesson:</label><br>
    <input type="range" id="lessonSlider" min="1" max="14" value="1" step="1" style="width:100%;">
    <div id="lessonLabel">Lesson 1 – Real Numbers</div>
  </div>

  <button id="generateBtn">Generate 50 Fresh MCQs</button>
  <p class="loading" id="status"></p>

  <div id="mcqOutput"></div>
</div>

<script>
/* ------------------------------------------------------------------
   CONFIGURATION
   ------------------------------------------------------------------ */
const API_URL = 'https://openrouter.ai/api/v1/chat/completions'; 
const MODEL = 'deepseek/deepseek-r1:free'; // current free DeepSeek model  
  
const LESSONS = [
  null,
  'Real Numbers',
  'Polynomials',
  'Pair of Linear Equations in Two Variables',
  'Quadratic Equations',
  'Arithmetic Progressions',
  'Triangles',
  'Coordinate Geometry',
  'Introduction to Trigonometry',
  'Some Applications of Trigonometry',
  'Circles',
  'Areas Related to Circles',
  'Surface Areas and Volumes',
  'Probability',          // Lesson 13
  'Statistics'            // Lesson 14
];

/* ------------------------------------------------------------------
   UI – slider label
   ------------------------------------------------------------------ */
const slider   = document.getElementById('lessonSlider');
const label    = document.getElementById('lessonLabel');
const status   = document.getElementById('status');
const output   = document.getElementById('mcqOutput');
const genBtn   = document.getElementById('generateBtn');

function updateLabel() {
  const idx = slider.value;
  label.textContent = `Lesson ${idx} – ${LESSONS[idx]}`;
}
slider.addEventListener('input', updateLabel);
updateLabel();

/* ------------------------------------------------------------------
   CORE – generate 50 MCQs (chunked)
   ------------------------------------------------------------------ */
async function generateMCQs() {
  const lessonIdx = slider.value;
  const lessonName = LESSONS[lessonIdx];
  const PER_REQUEST = 10;
  const TOTAL       = 50;
  const calls       = Math.ceil(TOTAL / PER_REQUEST);

  genBtn.disabled = true;
  status.textContent = `Generating 0/${TOTAL} …`;
  output.innerHTML = '';

  const allQs = [];

  for (let i = 0; i < calls; i++) {
    const num = (i === calls - 1) ? TOTAL - allQs.length : PER_REQUEST;
    const start = allQs.length + 1;

    const prompt = `You are a CBSE Class-10 expert. Create **${num} brand-new multiple-choice questions** 
(starting from question ${start}) on **${lessonName}**. Each question must have:
- 4 options (A,B,C,D)
- exactly one correct answer
- a short explanation

Return **only** a JSON array with objects:
{
  "q": "question text",
  "options": ["A) …","B) …","C) …","D) …"],
  "answer": "A" | "B" | "C" | "D",
  "explanation": "brief reason"
}
No extra text, no markdown fences.`;

    try {
      const resp = await fetch('https://api.deepseek.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${DEEPSEEK_API_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          model: DEEPSEEK_MODEL,
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.8,
          max_tokens: 2500
        })
      });

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error?.message || `HTTP ${resp.status}`);
      }

      const data = await resp.json();
      const raw = data.choices[0].message.content.trim();

      let chunk;
      try {
        const cleaned = raw.replace(/^```json\s*|```$/g, '').trim();
        chunk = JSON.parse(cleaned);
      } catch (e) {
        console.warn('Raw chunk:', raw);
        throw new Error('Invalid JSON from model');
      }

      allQs.push(...chunk);
      status.textContent = `Generating ${allQs.length}/${TOTAL} …`;

    } catch (err) {
      status.textContent = 'Error: ' + err.message;
      console.error(err);
      genBtn.disabled = false;
      return;
    }
  }

  renderMCQs(allQs);
  status.textContent = `Done! ${TOTAL} MCQs ready.`;
  genBtn.disabled = false;
}

/* ------------------------------------------------------------------
   Render
   ------------------------------------------------------------------ */
function renderMCQs(qs) {
  output.innerHTML = qs.map((q, i) => `
    <div class="mcq">
      <strong>${i+1}.</strong> ${q.q}<br>
      <div class="options">
        ${q.options.map(opt => `<div>${opt}</div>`).join('')}
      </div>
      <details><summary><small>Show answer</small></summary>
        <p><strong>Answer:</strong> ${q.answer}<br>
           <strong>Explanation:</strong> ${q.explanation}</p>
      </details>
    </div>
  `).join('');
}

/* ------------------------------------------------------------------
   Button
   ------------------------------------------------------------------ */
genBtn.addEventListener('click', generateMCQs);
</script>

</body>
</html>
